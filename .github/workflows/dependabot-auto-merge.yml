# =============================================================================
# Dependabot Auto-Merge Workflow
# =============================================================================
# Automatically approves and merges Dependabot PRs for patch and minor updates,
# but ONLY after verifying the dependencies actually install correctly.
#
# How it works:
#   1. Dependabot opens a PR
#   2. This workflow checks the update type (patch/minor/major)
#   3. Major: skip — requires manual review
#   4. Patch & minor: checkout PR code, run npm install / pip install
#   5. If install succeeds: auto-approve + enable auto-merge (squash)
#   6. If install fails: post comment, do NOT approve
#   7. Auto-merge waits for CI (CodeQL) to pass before completing
# =============================================================================

name: Dependabot Auto-Merge

on:
  pull_request:

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    name: Auto-merge Dependabot PR
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log skipped major update
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "⚠️ Major version bump detected: ${{ steps.metadata.outputs.dependency-names }}"
          echo "   ${{ steps.metadata.outputs.previous-version }} → ${{ steps.metadata.outputs.new-version }}"
          echo "   Skipping auto-merge — manual review required."

      - name: Checkout PR code
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify dependencies install and build
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        id: verify
        run: |
          FAILED=false

          # Check all directories with package-lock.json (npm projects)
          for lockfile in $(find . -name "package-lock.json" -not -path "*/node_modules/*" 2>/dev/null); do
            DIR=$(dirname "$lockfile")
            echo "📦 Testing npm install in $DIR..."
            if (cd "$DIR" && npm install 2>&1); then
              echo "   ✅ $DIR — install succeeded"
              # Run build to catch breaking changes (e.g., Vite 5→8 API incompatibility)
              # This is the real gate — install alone doesn't catch major version breaks
              if [ -f "$DIR/package.json" ] && grep -q '"build"' "$DIR/package.json"; then
                echo "   🔨 Testing npm run build in $DIR..."
                if (cd "$DIR" && npm run build 2>&1); then
                  echo "   ✅ $DIR — build succeeded"
                else
                  echo "   ❌ $DIR — build FAILED (likely a breaking change)"
                  FAILED=true
                fi
              fi
            else
              echo "   ❌ $DIR — install FAILED"
              FAILED=true
            fi
          done

          # Check all directories with requirements.txt (Python projects)
          for reqfile in $(find . -name "requirements.txt" -not -path "*/node_modules/*" 2>/dev/null); do
            DIR=$(dirname "$reqfile")
            echo "🐍 Testing pip install in $DIR..."
            if (cd "$DIR" && pip install -r requirements.txt --dry-run 2>&1); then
              echo "   ✅ $DIR — install succeeded"
            else
              echo "   ❌ $DIR — install FAILED"
              FAILED=true
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo "install_ok=false" >> $GITHUB_OUTPUT
          else
            echo "install_ok=true" >> $GITHUB_OUTPUT
          fi

      - name: Comment on failed install
        if: steps.metadata.outputs.update-type != 'version-update:semver-major' && steps.verify.outputs.install_ok == 'false'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "$PR_URL" --body "## ❌ Auto-merge blocked

          The dependency update from **${{ steps.metadata.outputs.dependency-names }}** (${{ steps.metadata.outputs.previous-version }} → ${{ steps.metadata.outputs.new-version }}) failed the install verification.

          \`npm install\` or \`pip install\` failed with errors. This PR will **not** be auto-merged.

          **Next steps:**
          - Check the workflow logs for the specific error
          - Fix the dependency conflict manually, or close this PR

          🤖 _Dependabot Auto-Merge_"

      - name: Auto-approve patch and minor updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major' && steps.verify.outputs.install_ok == 'true'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major' && steps.verify.outputs.install_ok == 'true'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
