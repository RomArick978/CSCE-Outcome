# ============================================================================
# LOCAL DEVELOPMENT - DOCKER COMPOSE
# ============================================================================
# This file is configured by AI based on your stack choice.
#
# Commands:
#   docker compose up --build     # Start all services
#   docker compose down           # Stop services
#   docker compose logs -f        # View logs
#   docker compose up db -d       # Start only database
# ============================================================================

version: '3.8'

services:
  # --------------------------------------------------------------------------
  # FRONTEND
  # --------------------------------------------------------------------------
  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    volumes:
      # Mount local nginx config with API proxy (production nginx.conf has no proxy)
      - ./frontend/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # BACKEND (REMOVE THIS ENTIRE BLOCK FOR FRONTEND-ONLY APPS)
  # Also remove "depends_on: backend" from frontend service above
  # --------------------------------------------------------------------------
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env               # Gitignored — secrets stay private
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=3306           # Change to 5432 for PostgreSQL
      - DATABASE_NAME=demo
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # DATABASE (REMOVE THIS ENTIRE BLOCK FOR FRONTEND-ONLY APPS)
  # --------------------------------------------------------------------------
  # AI will switch to PostgreSQL if needed (replace entire db block)
  db:
    image: mysql:8.0
    env_file:
      - ./database/.env               # Gitignored — credentials stay private
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d  # Init scripts
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # DATABASE (PostgreSQL - alternative)
  # --------------------------------------------------------------------------
  # AI will uncomment this and remove MySQL if PostgreSQL is chosen:
  # db:
  #   image: postgres:15
  #   env_file:
  #     - ./database/.env             # Gitignored — credentials stay private
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - db_data:/var/lib/postgresql/data
  #     - ./database/init:/docker-entrypoint-initdb.d  # Init scripts
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U demo_user -d demo"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
