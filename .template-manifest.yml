# =============================================================================
# Template Manifest - Vibe Hackathon Platform
# =============================================================================
# This file defines which files are synced to child repos.
# Child repos use template-sync.yml to pull updates from template.
#
# ARCHITECTURE (Pull-based, scales to 50k+ repos):
#   1. Template repo bumps version when platform files change
#   2. Child repos have template-sync.yml workflow
#   3. Child repos check manifest version and sync if outdated
# =============================================================================

version: "1.2.33"
template_repo: "bayer-int/dd-template-repository"
template_branch: "master"

# -----------------------------------------------------------------------------
# Files to auto-update (platform files, not user code)
# These are safe to overwrite - users shouldn't modify them
# -----------------------------------------------------------------------------
auto_update:
  # Workflows - CRITICAL: includes the sync workflow itself
  - path: ".github/workflows/deploy.yml"
    description: "Deployment workflow"
  - path: ".github/workflows/template-sync.yml"
    description: "Template sync workflow (enables pull-based updates)"
  - path: ".github/workflows/dependabot-auto-merge.yml"
    description: "Auto-merge patch/minor Dependabot PRs after CI passes"
    
  # Frontend Dockerfile templates
  - path: "frontend/Dockerfile.vanilla"
    description: "Vanilla HTML/CSS/JS Dockerfile template (secure, non-root)"
  - path: "frontend/Dockerfile.react"
    description: "React/Vite Dockerfile template (secure, non-root)"
    
  # Nginx configuration templates (with security headers)
  - path: "frontend/nginx.conf"
    description: "Production nginx config template (security headers included)"
    note: "Users should copy this when setting up frontend"
  - path: "frontend/nginx.local.conf"
    description: "Local dev nginx config template (with API proxy)"

  # Backend Dockerfile templates
  - path: "backend/Dockerfile.node"
    description: "Node.js backend Dockerfile template (secure, non-root)"
  - path: "backend/Dockerfile.python"
    description: "Python backend Dockerfile template (secure, non-root)"
  - path: "backend/Dockerfile.rust"
    description: "Rust backend Dockerfile template (secure, multi-stage, non-root)"
    
  # Database Dockerfile templates
  - path: "database/Dockerfile.postgres"
    description: "PostgreSQL database template"
  - path: "database/Dockerfile.mysql"
    description: "MySQL database template"
  # Vector Database Dockerfile templates
  - path: "vectordb/Dockerfile.pgvector"
    description: "pgvector vector database template"
  - path: "vectordb/Dockerfile.chroma"
    description: "ChromaDB vector database template"
  - path: "vectordb/Dockerfile.qdrant"
    description: "Qdrant vector database template"

  # AI instructions - always use latest guidance
  - path: ".cursorrules"
    description: "AI assistant instructions (Cursor)"
  - path: ".github/copilot-instructions.md"
    description: "AI assistant instructions (GitHub Copilot)"
  - path: ".clinerules/"
    description: "AI assistant detailed rules"
    is_directory: true
    
  # Security — AI ignore files and pre-commit hook
  - path: ".clineignore"
    description: "Cline AI ignore file (blocks sensitive files from auto-context)"
  - path: ".cursorignore"
    description: "Cursor AI ignore file (blocks sensitive files from reading)"
  - path: ".copilotignore"
    description: "GitHub Copilot ignore file (blocks sensitive files from context)"
  - path: "scripts/pre-commit-security-check.sh"
    description: "Pre-commit hook: blocks sensitive files and secrets from commits"
  - path: "scripts/install-hooks.sh"
    description: "Installs pre-commit security hook (runs on Codespace start)"

  # Database seed directory
  - path: "database/seed/.gitkeep"
    description: "Gitignored directory for local test/seed data"

  # AI context folder (for giving files to AI)
  - path: "context/.gitkeep"
    description: "Folder for files to share with AI assistant"
    
  # Development environment
  - path: ".devcontainer/devcontainer.json"
    description: "Codespaces/devcontainer configuration"
  - path: ".devcontainer/install-cline.sh"
    description: "Cline extension installer for Codespaces"
  - path: ".devcontainer/auto-update-template.sh"
    description: "Auto-check and apply template updates on Codespace start"
    
  # README
  - path: "README.md"
    description: "Project README with data security warning and getting started guide"

  # Documentation
  - path: "docs/MIGRATION.md"
    description: "Migration guide for existing projects"
  - path: "docs/EXAMPLES.md"
    description: "Example prompts for describing app ideas"
    
  # Code Snippet Library
  - path: "snippets/"
    description: "Reusable code snippets"
    is_directory: true
    
  # Examples
  - path: "examples/"
    description: "Example config files (eslint, ruff, vite)"
    is_directory: true

  # Scripts
  - path: "scripts/sync-from-template.sh"
    description: "Manual sync script (alternative to workflow)"
  - path: "scripts/apply-updates.sh"
    description: "AI-driven update script (machine-readable output)"
  - path: "scripts/check-updates.sh"
    description: "AI-driven version check script (machine-readable output)"
  - path: "scripts/preflight-check.sh"
    description: "Pre-deployment validation checks"

# -----------------------------------------------------------------------------
# Files to merge intelligently
# AI will preserve user additions while updating structure
# -----------------------------------------------------------------------------
merge_update:
  - path: "docker-compose.yml"
    description: "Local development configuration"
    strategy: "preserve_user_services"
    
  - path: ".gitignore"
    description: "Git ignore patterns"
    strategy: "append_missing"

# -----------------------------------------------------------------------------
# Files to check but not auto-update
# AI will warn if these are outdated but won't change them
# -----------------------------------------------------------------------------
check_only:
  - path: "frontend/nginx.conf"
    description: "User's nginx configuration"
    check_for:
      - "/health endpoint exists"
      - "No events{} or http{} blocks"
      - "Security headers present (server_tokens off, X-Frame-Options, X-Content-Type-Options, X-XSS-Protection)"
      
  - path: "frontend/Dockerfile"
    description: "User's frontend Dockerfile"
    check_for:
      - "nginx.conf copied to conf.d/default.conf"
      - "Non-root user (USER appuser or similar)"
      
  - path: "backend/Dockerfile"
    description: "User's backend Dockerfile"
    check_for:
      - "Non-root user (USER appuser or similar)"

# -----------------------------------------------------------------------------
# Files to never touch (user code and status)
# -----------------------------------------------------------------------------
ignore:
  - "frontend/src/**"
  - "frontend/index.html"
  - "frontend/style.css"
  - "frontend/script.js"
  - "frontend/package.json"
  - "frontend/Dockerfile"       # User's chosen frontend Dockerfile
  - "backend/server.js"
  - "backend/main.py"
  - "backend/requirements.txt"
  - "backend/package.json"
  - "backend/Cargo.toml"
  - "backend/Cargo.lock"
  - "backend/Dockerfile"        # User's chosen backend Dockerfile
  - "backend/src/**"            # User's backend source code
  - "backend/middleware/**"     # User's middleware (may include identity etc)
  - "database/Dockerfile"       # User's chosen database Dockerfile
  - "database/init/**"          # User's database init scripts
  - "vectordb/Dockerfile"       # User's chosen vector database Dockerfile
  - "vectordb/init/**"          # User's vector database init scripts
  - "docs/PROJECT_STATUS.md"    # User's project status - never overwrite!
  - "context/**"                # User's AI analysis files (gitignored anyway)
  - ".env"
  - "*.log"

# -----------------------------------------------------------------------------
# Files/directories to remove from child repos during sync
# These were previously part of the template but have been deprecated
# -----------------------------------------------------------------------------
cleanup:
  - path: "chat"
    type: "directory"
    reason: "Chat app moved to feat/chat branch"
  - path: ".chat"
    type: "gitignore_entry"
    reason: "Chat runtime data entry no longer needed"
  - path: "backend/env.example"
    type: "file"
    reason: "Removed — flagged by cybersecurity (credentials in repo)"
  - path: "database/env.example"
    type: "file"
    reason: "Removed — flagged by cybersecurity (credentials in repo)"
  - path: "database/.env.example"
    type: "file"
    reason: "Removed — flagged by cybersecurity (credentials in repo)"
  - path: "vectordb/env.example"
    type: "file"
    reason: "Removed — flagged by cybersecurity (credentials in repo)"

