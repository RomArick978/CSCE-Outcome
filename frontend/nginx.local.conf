# ============================================================================
# NGINX CONFIGURATION - LOCAL DEVELOPMENT
# ============================================================================
# This config is mounted via docker-compose for local development.
# It includes API proxy blocks that are NOT in the production nginx.conf.
#
# Production: nginx.conf (no proxy) - Traefik handles API routing
# Local dev:  nginx.local.conf (with proxy) - mounted by docker-compose
# ============================================================================

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ============================================
    # SECURITY HEADERS - REQUIRED!
    # ============================================
    
    # Hide nginx version (prevents information leakage)
    server_tokens off;
    
    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Enable XSS filter in browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # ============================================
    # HEALTH CHECK - REQUIRED
    # ============================================
    
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ============================================
    # API PROXY - LOCAL DEVELOPMENT ONLY
    # >>> REMOVE THIS ENTIRE SECTION FOR FRONTEND-ONLY APPS <<<
    # (if no backend service exists, nginx will FAIL to start!)
    # ============================================

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Proxy Socket.IO/WebSocket requests
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # ============================================
    # >>> END OF BACKEND PROXY SECTION <<<
    # ============================================

    # ============================================
    # SPA ROUTING
    # ============================================
    
    # Handle SPA routing (React, Vue, Angular)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # CACHING
    # ============================================
    
    # Prevent caching of HTML files
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache static assets (1 year)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
