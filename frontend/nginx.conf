# ============================================================================
# NGINX CONFIGURATION - PRODUCTION
# ============================================================================
# This file is copied to /etc/nginx/conf.d/default.conf
# ONLY server block - NO events{} or http{} blocks!
#
# PRODUCTION: Traefik handles /api/* routing, nginx only serves static files
# LOCAL DEV:  docker-compose mounts nginx.local.conf (with API proxy)
# ============================================================================

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ============================================
    # SECURITY HEADERS - REQUIRED!
    # ============================================
    
    # Hide nginx version (prevents information leakage)
    server_tokens off;
    
    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Enable XSS filter in browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Content Security Policy (optional — uncomment and customize)
    # Starts restrictive: only allow resources from same origin.
    # Adjust if your app uses inline scripts, CDN resources, or external APIs.
    #
    # Common customizations:
    #   - Inline styles:  style-src 'self' 'unsafe-inline'
    #   - Google Fonts:   font-src 'self' fonts.gstatic.com; style-src 'self' fonts.googleapis.com
    #   - CDN scripts:    script-src 'self' cdn.jsdelivr.net
    #   - Images from anywhere: img-src 'self' data: https:
    #
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'" always;

    # ============================================
    # HEALTH CHECK - REQUIRED FOR DEPLOYMENT
    # ============================================
    
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ============================================
    # SPA ROUTING
    # ============================================
    
    # Handle SPA routing (React, Vue, Angular)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # CACHING
    # ============================================
    
    # Prevent caching of HTML files (critical for SPA deployments)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache static assets with hashed filenames (1 year)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
